name: Update Stock Data

on:
  schedule:
    # Run every 15 minutes during market hours (UTC 13:30-20:00 = NYSE 9:30-16:00 EST)
    - cron: '*/15 13-20 * * 1-5'
    # Also run every hour on weekends to keep data fresh
    - cron: '0 * * * 6,0'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  fetch-stocks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install yfinance requests

      - name: Create output directory
        run: mkdir -p docs/api

      - name: Fetch stock data
        run: python backend/stock_fetcher.py

      - name: Commit and push if data changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/api/stocks.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Update stock data $(date -u '+%Y-%m-%d %H:%M') UTC" && git push)
